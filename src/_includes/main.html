<script>

// Music Player
const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const volumeSlider = document.getElementById('volumeSlider');
//const volumeIcon = document.getElementById('volumeIcon');
const songTitle = document.getElementById('songTitle');
const songArtist = document.getElementById('songArtist');
const songCover = document.getElementById('songCover');
const songCoverLink = document.getElementById('songCoverLink');
const titleMarquee = document.getElementById("titleMarquee");
const musicPlayer = document.getElementById("musicPlayer");



// Playlist - add your songs here
const playlist = [
        {
            title: 'キャプテン・ムラサ',
            artist: 'Matt Dupraz',
            src: 'assets/audio/captain_murasa.mp3',
            cover: 'assets/images/captain_murasa_small.jpg',
            coverLarge: 'assets/images/captain_murasa.png'
        },
        {
            title: 'The improbable adventure of Arthur Dent',
            artist: 'Matt Dupraz',
            src: 'assets/audio/arthur_dent.mp3',
            cover: 'assets/images/arthur_dent_small.jpg',
            coverLarge: 'assets/images/arthur_dent.jpg'
        }
];

let currentTrack = 0;
let isPlaying = false;

// Load track
function loadTrack(index) {
  if (playlist.length === 0) return;
  currentTrack = index;
  const track = playlist[currentTrack];
  audio.src = track.src;
  songTitle.textContent = track.title;
  //songArtist.textContent = track.artist;
  progressFill.style.width = '0%';
  currentTimeEl.textContent = '0:00';
  songCover.src = track.cover;
  songCoverLink.href = track.coverLarge;
}

// Play/Pause
playBtn.addEventListener('click', () => {
  if (isPlaying) {
    audio.pause();
    playBtn.textContent = '▶';
  } else {
    audio.play();
    playBtn.textContent = '⏸';
  }
  isPlaying = !isPlaying;
});

// Previous track
prevBtn.addEventListener('click', () => {
  currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
  loadTrack(currentTrack);
  if (isPlaying) audio.play();
});

// Next track
nextBtn.addEventListener('click', () => {
  currentTrack = (currentTrack + 1) % playlist.length;
  loadTrack(currentTrack);
  if (isPlaying) audio.play();
});

// Update progress bar
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const percent = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = percent + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
  }
});

// Set duration when loaded
audio.addEventListener('loadedmetadata', () => {
  durationEl.textContent = formatTime(audio.duration);
});

// Click on progress bar to seek
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  audio.currentTime = percent * audio.duration;
});

// Volume control
volumeSlider.addEventListener('input', (e) => {
  audio.volume = e.target.value / 100;
  //volumeIcon.textContent = audio.volume === 0 ? '♩' : '♫';
});

/*
// Mute toggle
volumeIcon.addEventListener('click', () => {
  audio.muted = !audio.muted;
  volumeIcon.textContent = audio.muted ? '♩' : '♫';
  volumeSlider.value = audio.muted ? 0 : audio.volume * 100;
});
*/
// Auto-play next track when current ends
audio.addEventListener('ended', () => {
  currentTrack = (currentTrack + 1) % playlist.length;
  loadTrack(currentTrack);
  audio.play();
});

// Format time as M:SS
function formatTime(seconds) {
  if (isNaN(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return mins + ':' + (secs < 10 ? '0' : '') + secs;
}

// Initialize
audio.volume = 0.7;
loadTrack(0);

musicPlayer.style.display = "block";

</script>
